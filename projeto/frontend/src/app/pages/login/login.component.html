<!-- Com carinho na experiencia, esta tela faz autenticacao e abre acesso as tarefas. -->
<div class="page-center">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Tarefy</mat-card-title>
      <mat-card-subtitle>Organize o seu dia com leveza.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="card-content">
      <form [formGroup]="form" (ngSubmit)="login()">

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            E-mail obrigatório.
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            E-mail inválido.
          </mat-error>
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            Senha obrigatória.
          </mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" class="full-width" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block;margin-right:8px"></mat-spinner>
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <div class="link-row">
        <a routerLink="/register">Não tem conta? Criar conta</a>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
