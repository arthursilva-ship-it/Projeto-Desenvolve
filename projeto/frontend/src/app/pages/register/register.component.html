<!-- Com alegria no onboarding, esta tela coleta e valida os dados de cadastro. -->
<div class="page-center">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Criar Conta</mat-card-title>
      <mat-card-subtitle>Leva menos de 1 minuto para começar.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="card-content">
      <form [formGroup]="form" (ngSubmit)="register()">

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name" autocomplete="name">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="form.get('name')?.hasError('required')">Nome obrigatório.</mat-error>
          <mat-error *ngIf="form.get('name')?.hasError('minlength')">Mínimo 2 caracteres.</mat-error>
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">E-mail obrigatório.</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">E-mail inválido.</mat-error>
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="new-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-hint>Mínimo 6 caracteres.</mat-hint>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Senha obrigatória.</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Mínimo 6 caracteres.</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" class="full-width" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block;margin-right:8px"></mat-spinner>
          {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <div class="link-row">
        <a routerLink="/">Já tem conta? Entrar</a>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
